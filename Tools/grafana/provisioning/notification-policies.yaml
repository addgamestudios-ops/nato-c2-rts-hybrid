# =====================================================================
#  Grafana notification policy — routes fired alerts to a contact
#  point. Default routes everything to the placeholder email
#  contact (which does nothing until you set a real address).
#
#  To route NATO C2 L16 alerts to Slack:
#    1. Edit contact-points.yaml — uncomment the Slack receiver and
#       paste your webhook URL.
#    2. Below, change `receiver: grafana-default-email` to
#       `receiver: nato-l16-slack`.
#    3. `docker compose restart grafana`.
#
#  You can also add per-severity matchers — e.g. send `critical` to
#  PagerDuty and `warning` to Slack. See the commented example.
# =====================================================================

apiVersion: 1

policies:
  - orgId: 1
    receiver: grafana-default-email
    group_by: [grafana_folder, alertname]
    group_wait:      30s
    group_interval:  5m
    repeat_interval: 4h
    # routes:
    #   - receiver: nato-l16-slack
    #     matchers:
    #       - system = link16
    #       - severity = critical
    #     group_wait:      10s
    #     repeat_interval: 1h
