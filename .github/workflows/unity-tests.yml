# =====================================================================
#  NATO C2 RTS Hybrid — Unity test CI
#  ---------------------------------------------------------------------
#  Runs both EditMode and PlayMode test suites on every push to main
#  and every PR. The split is intentional:
#
#      EditMode  — fast, deterministic checks that don't need
#                  MonoBehaviour.Update to tick. Lives in
#                  Tests/Editor/ (asmdef: NATO.C2.Tests.Editor).
#
#      PlayMode  — full-lifecycle integration tests. Includes the
#                  federation soak test
#                  (FederationSoakTests.Soak_FullStack_ConservationAndCaptureValidate)
#                  which is the production-readiness gate, plus
#                  ORCA/movement and Link 16 envelope-density tests
#                  that depend on Update firing at real frame cadence
#                  and Burst jobs completing under the JobSystem.
#                  Lives in Tests/PlayMode/ (asmdef:
#                  NATO.C2.Tests.PlayMode).
#
#  SECRETS REQUIRED (set in repo → Settings → Secrets and variables → Actions):
#      UNITY_LICENSE          Personal / Plus / Pro licence ULF content.
#      UNITY_EMAIL            Unity account email (only if using Plus/Pro).
#      UNITY_PASSWORD         Unity account password (Plus/Pro).
#      UNITY_SERIAL           Pro/Plus serial key (Pro/Plus only).
#
#  Artifacts uploaded on EVERY run (even on success):
#      • Test results (JUnit XML) — for the GitHub Checks UI
#      • Soak artifacts (Captures/*.dpdu, Logs/*.csv) — for forensic
#        debug when the soak test exposes a federation issue.
#        Only the PlayMode run produces these.
# =====================================================================

name: Unity Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'Tools/wireshark/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'Tools/wireshark/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

# Cancel any in-flight run on the same ref when a newer one arrives —
# saves CI minutes on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.testMode }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - EditMode
          - PlayMode

    env:
      # Soak test honours this — captures + logs land here so the
      # upload-artifact step at the end can grab them.
      NATO_TEST_ARTIFACTS_DIR: ${{ github.workspace }}/soak-artifacts
      # Refuse unsigned scenarios in CI. FederationChaosMode.LoadScenarioFromFile
      # checks this and hard-rejects when set. ScenarioSigner.VerifyAll covers
      # signed-state in PRs; this guards the runtime loader too.
      NATO_REQUIRE_SIGNED_SCENARIOS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare artifact directory
        run: |
          mkdir -p "${NATO_TEST_ARTIFACTS_DIR}/Captures"
          mkdir -p "${NATO_TEST_ARTIFACTS_DIR}/Logs"

      # Cache Library/ between runs — first compile is slow, subsequent
      # ones are ~30 s vs ~5 min from scratch.
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-
            Library-

      - name: Run Unity tests
        id: unity_tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          # Re-export so Unity sees it inside the container.
          NATO_TEST_ARTIFACTS_DIR: ${{ env.NATO_TEST_ARTIFACTS_DIR }}
        with:
          testMode: ${{ matrix.testMode }}
          checkName: ${{ matrix.testMode }} Test Results
          projectPath: .
          artifactsPath: artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # Parse JUnit XML and post a Markdown summary into the run's
      # "Summary" tab. Makes failing tests visible without drilling
      # into the raw artifact.
      - name: Publish JUnit summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: artifacts/**/*.xml
        continue-on-error: true

      # Verify the federation soak test actually ran. Guards against
      # someone accidentally [Ignore]-ing it or renaming the fixture.
      # PlayMode-only because the soak test lives in Tests/PlayMode/.
      - name: Verify soak test ran (PlayMode only)
        if: always() && matrix.testMode == 'PlayMode'
        shell: bash
        run: |
          set -eo pipefail
          if ! grep -lR "FederationSoakTests" artifacts/ >/dev/null 2>&1; then
            echo "::error::FederationSoakTests did not appear in any PlayMode JUnit report. Did someone disable it or change its name?"
            exit 1
          fi
          echo "FederationSoakTests confirmed present in PlayMode JUnit report."

      # Convert the soak's synthetic capture to PCAP and run the chain
      # verifier. Both outputs land back in NATO_TEST_ARTIFACTS_DIR so
      # the upload-artifact step grabs them automatically. PlayMode-only
      # because only the PlayMode soak run produces the capture.
      - name: Convert + verify soak capture (PlayMode only)
        if: always() && matrix.testMode == 'PlayMode'
        shell: bash
        run: |
          set -uo pipefail
          capture="$(find "${NATO_TEST_ARTIFACTS_DIR}/Captures" -name '*.dpdu' 2>/dev/null | head -1 || true)"
          if [ -z "${capture}" ]; then
            echo "::warning::no soak .dpdu found under ${NATO_TEST_ARTIFACTS_DIR}/Captures"
            exit 0
          fi
          echo "Found soak capture: ${capture}"

          # 1. Chain-verify.
          if python3 Tools/verify-dpdu.py "${capture}"; then
            echo "::notice::soak capture passed chain verification"
          else
            rc=$?
            if [ "${rc}" = "2" ]; then
              echo "::error::soak capture is TAMPERED — chain verification failed"
              exit 2
            else
              echo "::warning::verify-dpdu.py reported rc=${rc} (malformed file?)"
            fi
          fi

          # 2. Convert to PCAP for Wireshark forensic reviews.
          pcap="${NATO_TEST_ARTIFACTS_DIR}/Captures/$(basename "${capture}" .dpdu).pcap"
          if python3 Tools/wireshark/dpdu-to-pcap.py "${capture}" "${pcap}"; then
            echo "::notice::wrote PCAP → ${pcap}"
          else
            echo "::warning::PCAP conversion failed (non-fatal)"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.testMode }}
          path: artifacts

      - name: Upload soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-artifacts-${{ matrix.testMode }}
          path: ${{ env.NATO_TEST_ARTIFACTS_DIR }}
          if-no-files-found: ignore
